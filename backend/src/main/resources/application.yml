server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/job_demo2?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 100MB
  redis:
    host: localhost
    port: 6379
    database: 0
    password: 123456

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  mapper-locations: classpath:/mapper/**/*.xml
  type-aliases-package: com.checkin.entity

upload:
  path: ../uploads/
  access-url: /uploads/

jwt:
  secret: travelCheckinSecretKey2024
  expiration: 86400000
